[core]

dags_folder = /opt/airflow/airflow/dags                ## location of DAG files
base_log_folder = /opt/airflow/logs                    ## Airflow logs folder
executor = SequentialExecutor                          ## simple executor for local/dev use
load_examples = False                                  ## disable example DAGs
default_timezone = utc                                 ## timezone for scheduling
parallelism = 4                                        ## max parallel tasks
dag_concurrency = 2                                    ## max tasks per DAG

sql_alchemy_conn = sqlite:////opt/airflow/airflow.db   ## metadata database


[logging]

logging_level = INFO                                   ## logging verbosity
base_log_folder = /opt/airflow/logs                    ## log folder
remote_logging = False                                 ## no remote log storage


[webserver]

web_server_host = 0.0.0.0                              ## allow external access
web_server_port = 8080                                 ## airflow UI port
expose_config = True                                   ## allow config view in UI
workers = 2                                            ## webserver workers


[scheduler]

job_heartbeat_sec = 5                                  ## scheduler heartbeat
scheduler_heartbeat_sec = 5                            ## scheduler loop interval
min_file_process_interval = 30                         ## DAG reload interval
catchup_by_default = False                             ## avoid backfilling


[metrics]

statsd_on = False                                      ## disable statsd
metrics_allow_list = scheduler,executor,dagrun,task    ## metrics to expose
metrics_block_list =                                   ## none blocked


[prometheus]

enable_prometheus = True                               ## enable prometheus metrics
prometheus_port = 8793                                 ## scheduler metrics port
prometheus_host = 0.0.0.0                              ## bind all interfaces


[api]

auth_backend = airflow.api.auth.backend.basic_auth     ## simple auth backend


[celery]

worker_concurrency = 2                                 ## celery worker concurrency (unused here)