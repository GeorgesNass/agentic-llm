[pytest]
minversion = 7.0

## Where tests are located
testpaths =
    tests

## Test file naming convention
python_files =
    test_*.py

## Optional naming conventions for test classes and functions
python_classes =
    Test*

python_functions =
    test_*

## Add project root to PYTHONPATH
pythonpath =
    .

## Pytest options
addopts =
    -ra
    --strict-markers
    --disable-warnings

## Warning filtering
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

## Custom markers
markers =
    slow: marks tests as slow (e.g., large models, calibration datasets)
    gpu: marks tests that require a GPU
    integration: marks integration tests (pipeline, export, benchmark)
    unit: marks fast isolated unit tests
    smoke: marks basic smoke tests for quick validation

## Directories to ignore during test discovery
norecursedirs =
    .git
    .github
    .venv
    venv
    env
    __pycache__
    build
    dist
    artifacts
    outputs
    logs
    models
    data
    notebooks
    docker